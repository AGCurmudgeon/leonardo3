# This file contains common pin mappings for the BIGTREETECH EBBT0
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBB_T0]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_42069-if00

[adxl345 T0]
cs_pin: EBB_T0: PB12
spi_software_sclk_pin: EBB_T0: PB10
spi_software_mosi_pin: EBB_T0: PB11
spi_software_miso_pin: EBB_T0: PB2
axes_map: x, z, -y

[extruder]
step_pin: EBB_T0:PD0
dir_pin: EBB_T0:PD1
enable_pin: !EBB_T0:PD2

##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##------------------------------------
rotation_distance: 5.612
##--------------------------------------------------------------------
microsteps: 16
full_steps_per_rotation: 200

nozzle_diameter: 0.6
filament_diameter: 1.75
max_extrude_cross_section: 5
max_extrude_only_distance: 200.0

#####################################################################
#   Heater
#####################################################################
heater_pin: EBB_T0:PB13
sensor_pin: EBB_T0:PA3
sensor_type: ATC Semitec 104NT-4-R025H42G
control: pid
pid_Kp: 23.367
pid_Ki: 7.418
pid_Kd: 18.402
min_temp: 0
max_temp: 295
min_extrude_temp: 180
##--------------------------------------------------------------------
## Pressure Advance
pressure_advance: 0.042             # Try to keep pressure_advance below 1.0
pressure_advance_smooth_time: 0.040 # Default is 0.040, leave stock
##--------------------------------------------------------------------


[tmc2209 extruder]
uart_pin: EBB_T0:PA15
#tx_pin: EBB_T0:gpio1
run_current: 0.6
stealthchop_threshold: 0
sense_resistor: 0.110

[heater_fan T0_hotend_fan]
pin: EBB_T0:PA0
heater: extruder
heater_temp: 50.0
#tachometer_pin: EBB_T0:gpio16

[fan_generic T0_partfan]
pin: EBB_T0:PA1

[gcode_macro T0]
variable_active: 0
variable_color: ""
variable_tool_number: 0
gcode:
    SELECT_TOOL T=0

#change the tool numbers to the tool you are configuring, ie T0, T1, etc
[tool T0]
#change this too
tool_number: 0
detection_pin: !EBB_T0: PB6
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0
#if this were T1, then this would be extruder1, etc
extruder: extruder
#Change T0_partfan to tool number
fan: T0_partfan

# For InputShaper run per tool and enter the frequency here
# shaper_type_x: 2hump_ei
# shaper_freq_x: 85.2
# damping_ratio_x: 0.049
# shaper_type_y: ei
# shaper_freq_Y: 60
# damping_ratio_y: 0.053
# params_input_shaper_type_x: 'mzv'
# params_input_shaper_freq_x: 124.4
# params_damping_ratio_x: 0.051
# params_input_shaper_type_y: 'mzv'
# params_input_shaper_freq_y: 52.8
# params_damping_ratio_y: 0.119

dropoff_gcode:
    {% set fast = tool.params_fast_speed|float %}
    {% set careful = tool.params_path_speed %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set cur_z = printer.toolhead.position[2]|float %}
    {% set random_a = range(-4, 4) | random %}
    {% set random_b = range(-4, 4) | random %}
  
    VERIFY_TOOL_DETECTED T=0
    STOP_CRASH_DETECTION T=0
    
    RESPOND TYPE=echo MSG='Dropping off {tool.name}'
    G90
    ; Move 1 mm up to avoid crashing into things
    G0 Z{ [cur_z+1.0, max_z]|min } F{fast}
    
    #   ##############  Move up to the dock  ##############
    ROUNDED_G0 Y={tool.params_safe_toolhead_y} F={fast} D=20
    ROUNDED_G0 X={tool.params_brush_x_t0 + tool.params_brush_width + random_b} F={fast} D=5
    ROUNDED_G0 Y={tool.params_brush_y + random_a} F={fast} D=5
    ROUNDED_G0 X={tool.params_dock_x_t0 + tool.params_dock_x_clearance} Y={tool.params_attach_y} F={fast} D=0
    
    # UNPrime
    RESPOND MSG="{printer["gcode_macro PRIME_SAFETY"].autoprime_t0}"
    {% if printer[tool.extruder].target|int >= 175 and printer["gcode_macro PRIME_SAFETY"].autoprime_t0 %}
      RESPOND msg="Big Retract"
      G1 E{0 - tool.params_filament_park_amount} F{tool.params_fast_purge}
    {% endif %}  

    #  ############## Run the path ##############
    G0 X{tool.params_dock_x_t0} F{careful}
    set_logo_leds_standby_T0
    set_nozzle_leds_standby_T0
    G4 P250
    G0 Y{tool.params_safe_shuttle_y} F{careful}
    G0 Y{tool.params_safe_toolhead_y} F{fast}
    M400
    VERIFY_EMPTY
    
pickup_gcode:
    M400
    VERIFY_EMPTY
    {% set fast = tool.params_fast_speed|float %}
    {% set careful = tool.params_path_speed %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set cur_z = printer.toolhead.position[2]|float %}
    {% set random_a = range(-4, 4) | random %}
    {% set random_b = range(-4, 4) | random %}
    
    RESPOND TYPE=echo MSG='Picking up {tool.name}'
    G90
    #   ##############  Move up to the dock  ##############
    M400
    ROUNDED_G0 Y={tool.params_safe_toolhead_y} F={fast} D=20
    ROUNDED_G0 X={tool.params_dock_x_t0} F={fast} D=10
    ROUNDED_G0 Y={tool.params_safe_shuttle_y} F={fast} D=0
    
    # Wait for temp before actually picking up the tool, while the nozzle is resting on it's pad.
    M109 T0 S{printer[tool.extruder].target|int}
    
    # Run the path
    G0 Y{tool.params_attach_y} F{careful}
    set_logo_leds_T0
    set_nozzle_leds_T0
    G4 P250
    G0 X{tool.params_dock_x_t0 + tool.params_dock_x_clearance} F{careful}
    
    # Prime
    G0 X{tool.params_brush_x_t0 - tool.params_brush_purge_width} Y{tool.params_brush_y + random_a} F{fast}
    
    RESPOND MSG="{printer["gcode_macro PRIME_SAFETY"].autoprime_t0}"
    {% if printer[tool.extruder].target|int >= 175 and printer["gcode_macro PRIME_SAFETY"].autoprime_t0 %}
      RESPOND msg="Prime/Purge"
      G1 E{tool.params_filament_park_amount + tool.params_prime_amount} F{tool.params_fast_purge}
      G4 P250
    {% endif %}

    G0 X{tool.params_brush_x_t0 + tool.params_brush_width + random_b} F{fast}
    G0 Y{tool.params_safe_shuttle_y} F{fast}
    
    # Restore the position with smooth rounded move.
    ROUNDED_G0 Y={tool.params_safe_y} F={fast} D=20
    {% if 'Z' in restore_position %}
      ROUNDED_G0 Z={restore_position.Z} F={fast} D=150
    {% endif %}
    {% if 'X' in restore_position %}
      ROUNDED_G0 X={restore_position.X} F={fast} D=1000
    {% endif %}
    {% if 'Y' in restore_position %}
      ROUNDED_G0 Y={restore_position.Y} F={fast} D=0
    {% endif %}
    ROUNDED_G0 D=0
    VERIFY_TOOL_DETECTED T=0
    START_CRASH_DETECTION T=0

[neopixel T0_leds]
pin: EBB_T0:PD3
chain_count: 3
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 0.250
initial_BLUE: 0.0
initial_WHITE: 0.0

[gcode_macro _T0_vars]
variable_logo_led_name:         "T0_leds"
variable_logo_idx:              "1"
variable_nozzle_led_name:       "T0_leds"
variable_nozzle_idx:            "2,3"
gcode:

#####################################################################
#   Toolhead 0 Filament runout switch
#####################################################################

[filament_switch_sensor switch_sensor_T0]
switch_pin: ^PG12
pause_on_runout: False
runout_gcode:
  PAUSE # [pause_resume] is required in printer.cfg
  RESPOND TYPE=echo MSG="Filament presence runout T0"

[filament_motion_sensor encoder_sensor_T0]
switch_pin: ^PG13
detection_length: 7
extruder: extruder
pause_on_runout: False
runout_gcode:
  PAUSE # [pause_resume] is required in printer.cfg
  RESPOND TYPE=echo MSG="Filament motion runout T0"

[gcode_macro START_FILAMENT_SENSORS_T0]
gcode:
  SET_FILAMENT_SENSOR SENSOR="switch_sensor_T0" ENABLE=1
  SET_FILAMENT_SENSOR SENSOR="encoder_sensor_T0" ENABLE=1
  # RESPOND TYPE=echo MSG="T0 filament sensors started"

[gcode_macro START_FILAMENT_SENSORS_DELAYED_T0]
gcode:
  UPDATE_DELAYED_GCODE ID=_FILAMENT_SENSORS_DELAYED_T0 DURATION=5
  # RESPOND MSG="T0 filament sensors started (DELAYING)"
  
[delayed_gcode _FILAMENT_SENSORS_DELAYED_T0]
initial_duration: 0.0
gcode:
  START_FILAMENT_SENSORS_T0
  # RESPOND MSG="T0 filament sensors started (DELAYED)"


