
  
# Slicer Start GCODE:
# SET_PRINT_STATS_INFO TOTAL_LAYER=[total_layer_count]
# MODE_SET IST0={is_extruder_used[0]} IST1={is_extruder_used[1]}
# PRINT_WARMUP BED_TEMP={first_layer_bed_temperature[0]} IST0={is_extruder_used[0]} IST1={is_extruder_used[1]}
# PRINT_START T0_TEMP={first_layer_temperature[0]} T1_TEMP={first_layer_temperature[1]} BED_TEMP={first_layer_bed_temperature[0]} TOOL_TEMP={first_layer_temperature[initial_tool]} TOOL={initial_tool} IST0={is_extruder_used[0]} IST1={is_extruder_used[1]}

[gcode_macro MODE_SET]
variable_mode: -1
gcode:
  {% if params.IST0|lower == 'true' and params.IST1|lower == 'true' %}
    SET_GCODE_VARIABLE MACRO=MODE_SET VARIABLE=mode VALUE=-1
    RESPOND MSG="Mode: -1" ; All: -1, T0: 0, T1: 1, Error: 2}
  {% elif params.IST0|lower == 'true' and params.IST1|lower == 'false' %}
    SET_GCODE_VARIABLE MACRO=MODE_SET VARIABLE=mode VALUE=0
    RESPOND MSG="Mode: 0" ; All: -1, T0: 0, T1: 1, Error: 2}
  {% elif params.IST1|lower == 'true' and params.IST0|lower == 'false' %}
    SET_GCODE_VARIABLE MACRO=MODE_SET VARIABLE=mode VALUE=1
    RESPOND MSG="Mode: 1" ; All: -1, T0: 0, T1: 1, Error: 2}
  {% endif %}

[gcode_macro PRIME_BLOB]
gcode:
    G90                             ; absolute positioning
    ROUNDED_G0 Y=110 Z=10 F=6000 D=25
    ROUNDED_G0 X=160 F=6000 D=20
    ROUNDED_G0 Y=65 F=6000 D=0
    
    G1 Z0.4 F600                    ; Lower to purge height
    
    G91                             ; relative positioning
    G1 Y10 E40 F40                   ; Extrude blob of filament on the bed
    M106 S255                         ; Enable Cooling Fan
    G1 X15 Z5 F100                  ; Slow drag away from the blob with fans helping cool and break strings. Also raiz z zo the blob clears the fan duct
    G1 X5 Z-5.1 F9000              ; Now that the blob has cleared the duct we go back down for a short 0.3mm height extrusion
    G1 X5 E2 F180                   ; Slow 5mm extrude move to help with stringing
    G1 Y30 E-2.5 F6000                ; Fast move and retract to break strings and reduce ooze
    G1 Z1 F100                      ; Lift
    M106 S0                         ; Disable Cooling Fan
    
    G90                             ; absolute positioning
    RESPOND MSG="Purge complete!"
  
[gcode_macro PRINT_WARMUP]
description: Perform initial homing and heating tasks
gcode:
    {% set t0_used = params.IST0|upper %}
    {% set t1_used = params.IST1|upper %}
    RESPOND MSG="PRINT_WARMUP!"
    CLEAR_PAUSE
    {% set BED_TEMP = params.BED_TEMP | int %}
    STOP_FILAMENT_SENSORS ;confirm filament sensors disabled

    RESPOND MSG="Homing"
    G28          ; home all axes
    G0 Z25
    BED_HEATSOAK TEMP={BED_TEMP}
      

[gcode_macro PRINT_START]
gcode:
  RESPOND MSG="START MACRO BEGINS"
  INITIALIZE_TOOLCHANGER    
  {% set TOOL = params.TOOL | default(0)| int %}
  {% set TOOL_SELECTED = printer[printer.toolchanger.tool] %}
  {% set TOOL_TEMP = params.TOOL_TEMP | default(0) | int %}
  {% set BED_TEMP = params.BED_TEMP | default(0) | int %}
  {% set T0_TEMP = params.T0_TEMP | default(0)| int %}
  {% set T1_TEMP = params.T1_TEMP | default(0)| int %}
  {% set t0_used = params.IST0|upper %}
  {% set t1_used = params.IST1|upper %}
  {% set MODE_START = printer["gcode_macro MODE_SET"].mode %}
  
  STOP_FILAMENT_SENSORS ;confirm filament sensors disabled and crash is off
  STOP_DROP_DETECTION
  
  {% if not 'xyz' in printer.toolhead.homed_axes %}
    RESPOND MSG="Homing"
    G28                             ; home all axes if not homed
  {% endif %}
  
  RESPOND MSG="Confirming bed temperature setting of {BED_TEMP} degrees"
  
  M140 S{BED_TEMP}
  QUAD_GANTRY_LEVEL
   
  {% if MODE_START == -1 %}; If both toolheads are used, heat them both to probing temp, select T0
    T0 TOGGLE_SENSORS=0;
    RESPOND MSG="Heating T0/T1 to probing temp"

    M104 T0 S160
    M104 T1 S160
    M109 T0 S160
    M109 T1 S160
    
    set_leds_quad
    CALIBRATE_ALL_OFFSETS

    T0 TOGGLE_SENSORS=0;
    
    set_nozzle_leds_scan_T0
    BED_MESH_CALIBRATE ADAPTIVE=1 ; Run adaptive bed mesh
    
    CARTOGRAPHER_TOUCH_HOME
        
    set_leds_print_auto
    
    T{TOOL} TOGGLE_SENSORS=0; Switch to the initial printing tool
    
    RESPOND MSG="Waiting on T{TOOL}, target={TOOL_TEMP}C"
    M104 T0 S{T0_TEMP}
    M104 T1 S{T1_TEMP}
    M109 T{TOOL} S{TOOL_TEMP}

    PRIME_BLOB

    PRIME_SAFETY T=0 AUTOPRIME='True'
    PRIME_SAFETY T=1 AUTOPRIME='True'
    START_FILAMENT_SENSORS_DELAYED_T{TOOL}
    START_DROP_DETECTION

  {% elif MODE_START == 0 %};  If only T0 is used, heat it to probing temp
    T0 TOGGLE_SENSORS=0;
    RESPOND MSG="Heating T0 to probing temp!"
    M109 T0 S170
    RESPOND MSG="Touching!"
    set_nozzle_leds_touching_T0
    CARTOGRAPHER_TOUCH_HOME
    set_nozzle_leds_scan_T0
    BED_MESH_CALIBRATE ADAPTIVE=1
    set_leds_print_auto
    RESPOND MSG="Waiting on T0, target={TOOL_TEMP}C"
    M109 T0 S{TOOL_TEMP} ; Wait for the tool to reach the target temperature
    RESPOND MSG="Purging!"
    PRIME_BLOB
    START_DROP_DETECTION
    START_FILAMENT_SENSORS_DELAYED_T0
    RESPOND MSG="Printing!"
    
  {% elif MODE_START == 1 %};  If only T1 is used, heat it to probing temp
    T1 TOGGLE_SENSORS=0;
    RESPOND MSG="Heating T1 to probing temp!"
    M109 T1 S170
    RESPOND MSG="Touching!"
    set_nozzle_leds_touching_T1
    CARTOGRAPHER_TOUCH_HOME
    set_nozzle_leds_scan_T1
    BED_MESH_CALIBRATE ADAPTIVE=1
    set_leds_print_auto 
    RESPOND MSG="Waiting on T1, target={T1_TEMP}C"
    M109 T1 S{TOOL_TEMP} ; Wait for the tool to reach the target temperature
    RESPOND MSG="Purging!"
    PRIME_BLOB
    M109 T1 S{TOOL_TEMP}
    M400
    START_DROP_DETECTION
    START_FILAMENT_SENSORS_DELAYED_T1
    RESPOND MSG="Printing!"

  {% else %}
    PAUSE
    RESPOND MSG="No toolhead defined!"
  {% endif %}
  
  CLEAR_PAUSE
  M83
  
[gcode_macro qgl]
gcode:
  QUAD_GANTRY_LEVEL
  
[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: QUAD_GANTRY_LEVEL_BASE
gcode:
   set_leds_quad
   QUAD_GANTRY_LEVEL_BASE
   set_leds_print_auto
   
[homing_override]
gcode:
  
  {% set tn = printer.toolchanger.tool_number|int %}
  set_nozzle_leds_homing
    
  {% if not printer.motors_sync.applied %}
      {% if not 'xy' in printer.toolhead.homed_axes %}
        G28 Y
        G28 X
      {% endif %}
      SYNC_MOTORS
  {% endif %}
  
  {% if not 'Z' in printer.toolhead.homed_axes %}
    G91
    SET_KINEMATIC_POSITION SET_HOMED=Z
    G1 Z15
    {% endif %}
  {% if not 'Z' in params and not 'X' in params and 'Y' in params %}
    G28 Y
  {% elif not 'Z' in params and not 'Y' in params and 'X' in params %}
    G28 X
  {% elif not 'Z' in params and 'X' in params and 'Y' in params %}
    G28 Y
    G28 X
  {% elif 'Z' in params and not 'X' in params and not 'Y' in params %}
    G90
    G1 X170 Y175 F4800
    G28 Z
  {% else %}
    G28 Y
    G28 X
    G90
    G1 X170 Y175 F4800
    G28 Z
  {% endif %}
  G90
  set_leds_print_auto
axes: xyz

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount

    RESPOND MSG="PAUSING"
    {% if printer['pause_resume'].is_paused|int == 0 %}
        M400
        RESPOND MSG="..."
        set_nozzle_leds_pause
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                              ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp0 VALUE={printer['extruder'].target}    ; set hotend temp variables for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp1 VALUE={printer['extruder1'].target}

        STOP_FILAMENT_SENSORS                                                                ; disable filament sensors
        STOP_DROP_DETECTION
        
        SAVE_GCODE_STATE NAME=PAUSE                                                          ; save current print position for resume
        BASE_PAUSE                                                                           ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}       ; check that zhop doesn't exceed z max
            G91                                                                              ; relative positioning
            G1 Z{z} F900                                                                     ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                  ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                  ; absolute positioning
        G1 X{printer.toolhead.axis_maximum.x/2} Y90 F6000                                    ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                      ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 T0 S0
        M104 T1 S0                                                                           ; turn off hotends
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                       ; set timeout to 12 hours
    RESPOND MSG="PAUSED"
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp0: 0
variable_etemp1: 0
gcode:

    # Parameters
    {% set e = params.E|default(2.5)|int %}                                          ; hotend prime amount (in mm)
    {% set tn = printer.toolchanger.tool_number|int %}
    {% set MODE_RESUME = printer["gcode_macro MODE_SET"].mode %}
    M400
    UPDATE_DELAYED_GCODE ID=_BED_HEATSOAK_LOOPER DURATION=0
    INITIALIZE_TOOLCHANGER
    {% if tn != -1 %}
      T{tn}
      START_FILAMENT_SENSORS_DELAYED_T{tn}
      START_DROP_DETECTION
    {% else %}
      set_standby_all
    {% endif %}
     
    {% if printer['pause_resume'].is_paused|int == 1 %}
        RESPOND MSG="RESUMING"
        #INITIAL_RGB                                                                    ; reset LCD color
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if MODE_RESUME == -1 %}
          M104 T0 S{etemp0|int}     
          M104 T1 S{etemp1|int}                                                  ; wait for hotend to heat back up
          M109 T0 S{etemp0|int}     
          M109 T1 S{etemp1|int} 
        {% elif MODE_RESUME == 0 %}
          M109 T0 S{etemp0|int} 
        {% elif MODE_RESUME == 1 %}
          M109 T1 S{etemp1|int} 
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100                     ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)
        G91                                                                          ; relative positioning
        M83                                                                          ; relative extruder positioning
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
            G1 Z{zhop * -1} E{e} F900                                                ; prime nozzle by E, lower Z back down
        {% else %}
            G1 Z{zhop * -1} F900                                                     ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60                          ; restore position

        BASE_RESUME                                                                  ; resume print
        RESPOND MSG="RESUMED"
        CLEAR_PAUSE
    {% endif %}
    
[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout} ; set timeout back to configured value
    SDCARD_RESET_FILE
    PRINT_END
    BASE_CANCEL_PRINT
    set_critical_error
    
[gcode_macro PRINT_END]
gcode:
    PRIME_SAFETY T=0 AUTOPRIME='False'
    PRIME_SAFETY T=1 AUTOPRIME='False'
    
    STOP_FILAMENT_SENSORS
    STOP_DROP_DETECTION
    # Move nozzle away from print while retracting
    G91
    G1 X-2 Y-2 E-2.25 F300
    # Turn off bed, extruder, and fan
    M140 S0
    M104 T0 S0
    M104 T1 S0
    M107 T0
    M107 T1
    # Raise nozzle by 10mm
    G1 Z10 F3000
    G90
    G1 X170 Y90
    # Disable steppers
    M84
    RESPOND MSG="Print Complete"
    set_nozzle_leds_finished
    set_logo_leds_T0
    set_logo_leds_T1
    CLEAR_PAUSE

[gcode_macro MOVE_TO_CENTER]
gcode:
    G90
    G0 Z40 F10000
    G0 X170 F10000
    G0 Y175
    G0 Z20 F10000
    
[gcode_macro STOP_FILAMENT_SENSORS]
gcode:
  SET_FILAMENT_SENSOR SENSOR="switch_sensor_T0" ENABLE=0
  SET_FILAMENT_SENSOR SENSOR="encoder_sensor_T0" ENABLE=0
  SET_FILAMENT_SENSOR SENSOR="switch_sensor_T1" ENABLE=0
  SET_FILAMENT_SENSOR SENSOR="encoder_sensor_T1" ENABLE=0
  # RESPOND TYPE=echo MSG="Filament sensors stopped"

[gcode_macro DOCK_SEQUENCE]
gcode:
  {% for i in range(0, params.REPS|default(10)|int)  %}
    T0
    G4 P1000
    T1
    G4 P1000
  {% endfor %}

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}
    
[gcode_macro fix_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=fix_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command fix_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh --fix"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True

[gcode_macro DUMP_VARIABLES]
gcode:
    {% set filter_name = params.NAME|default('')|string|lower %}
    {% set filter_value = params.VALUE|default('')|string|lower %}
    {% set show_cfg = params.SHOW_CFG|default(0)|int %}
    
    {% set out = [] %}

    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if (show_cfg or not (key1|lower == 'configfile' and key2|lower in ['config', 'settings'])) and (filter_name in key1|lower or filter_name in key2|lower) and filter_value in printer[key1][key2]|string|lower %}
                {% set dummy = out.append("printer['%s'].%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% else %}
            {% if filter_name in key1|lower and filter_value in printer[key1]|string|lower %}
                {% set dummy = out.append("printer['%s'] = %s" % (key1, printer[key1])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {action_respond_info(out|join("\n"))}

# Usage: SET_PAUSE_NEXT_LAYER [ENABLE=[0|1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable a pause if the next layer is reached
gcode:
  {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
  {% set ENABLE = params.ENABLE|default(1)|int != 0 %}
  {% set MACRO = params.MACRO|default(pause_next_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0|1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable/disable a pause if a given layer number is reached
gcode:
  {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
  {% set ENABLE = params.ENABLE|int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
  {% set LAYER = params.LAYER|default(pause_at_layer.layer)|int %}
  {% set MACRO = params.MACRO|default(pause_at_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

# Usage: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Overwrite, to get pause_next_layer and pause_at_layer feature
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_next_layer" % pause_next_layer.call}'
    {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER|int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
    {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}
  
[gcode_macro RELOAD_MACROS]
gcode:
  RELOAD_GCODE_MACROS
    